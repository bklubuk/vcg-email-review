<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VCG Email Suite — Review</title>
<style>
:root{--navy:#14224f;--mint:#10e698;--ink:#23304a;--line:#e3e8ee;--bg:#eef1f4;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink);}
header{background:linear-gradient(120deg,#1d3a78,#14224f 60%,#0e1838);color:#fff;padding:16px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;position:sticky;top:0;z-index:20;}
header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.3px;}
header .eyebrow{color:var(--mint);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.spacer{flex:1;}
.devtoggle button{background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;margin-left:6px;}
.devtoggle button.active{background:var(--mint);color:var(--navy);border-color:var(--mint);}
.layout{display:flex;min-height:calc(100vh - 56px);}
nav{width:250px;background:#fff;border-right:1px solid var(--line);padding:10px;overflow:auto;position:sticky;top:56px;height:calc(100vh - 56px);}
.navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--ink);font-size:13px;}
.navbtn:hover{background:#f4f7fb;}
.navbtn.active{background:#eafaf3;box-shadow:inset 0 0 0 1px var(--mint);}
.navbtn .n{font-weight:800;color:var(--navy);width:22px;}
.navbtn .l{flex:1;line-height:1.3;}
.navbtn .star{color:#ffc21f;font-size:12px;width:12px;}
.navbtn .badge{font-size:9px;font-weight:700;color:#c99700;letter-spacing:.5px;}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 16px 60px;overflow:auto;}
.title{font-size:15px;font-weight:700;color:var(--navy);margin:0 0 4px;}
.sub{font-size:12px;color:#5a6577;margin:0 0 20px;}
.frame{background:#fff;border-radius:26px;box-shadow:0 18px 50px rgba(20,34,79,.20);border:1px solid var(--line);padding:14px;transition:width .2s;}
.frame .screen{overflow:hidden;border-radius:12px;background:#fff;}
iframe{border:0;display:block;background:#fff;}
.hint{font-size:11px;color:#8a93a3;margin-top:14px;text-align:center;max-width:520px;}
.cbox{width:100%;max-width:640px;margin-top:26px;margin-bottom:36px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 26px rgba(20,34,79,.10);padding:20px 22px;}
.cbox .ceyebrow{color:#c99700;font-size:11px;font-weight:700;letter-spacing:2px;}
.cbox h3{margin:4px 0 12px;font-size:15px;color:var(--navy);}
.cbox label{display:block;font-size:11px;font-weight:700;letter-spacing:1px;color:#5a6577;text-transform:uppercase;margin:12px 0 5px;}
.cbox textarea,.cbox select,.cbox input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font:inherit;font-size:13.5px;background:#fff;}
.cbox textarea{min-height:96px;resize:vertical;}
.cbox .row{display:flex;align-items:center;gap:12px;margin-top:16px;}
.cbox button{background:var(--mint);color:var(--navy);border:0;border-radius:22px;padding:11px 26px;font-size:13.5px;font-weight:700;cursor:pointer;}
.cbox button:disabled{opacity:.5;cursor:default;}
.cbox .status{font-size:12.5px;}
.cbox .status.ok{color:#0c9c68;font-weight:600;}
.cbox .status.err{color:#d83c34;font-weight:600;}
</style></head><body>

sp;</div></body></html></script><script type="text/html" id="tpl-07"><!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light"><meta name="supported-color-schemes" content="light"><title>Debt Consolidation Scams: What To Know</title></head><body style="margin:0;padding:0;background:#e9edf3;"><div style="display:none;max-height:0;overflow:hidden;opacity:0;font-size:1px;line-height:1px;color:#e9edf3;">Debt consolidators promise to cut your MCA payback. Most can&rsquo;t &mdash; here&rsquo;s how to spot the scam and protect your business.</div><table role="presentation" align="center" width="600" cellpadding="0" cellspacing="0" style="width:600px;max-width:100%;table-layout:fixed;background:#fff;border-radius:16px;overflow:hidden;"><tr><td bgcolor="#14224f" background="https://bklubuk.github.io/vcg-email-review/vcg-review-commit/img/t07/masthead.jpg" style="background:#14224f url('https://bklubuk.github.io/vcg-email-review/vcg-review-commit/img/t07/masthead.jpg') center / cover no-repeat;padding:26px 40px 30px 40px;"><table width="100%" cellpadding="0" cellspacing="0"><tr><td valign="middle"><img src="https://mcusercontent.com/f4733abebb7dc7502fd88a377/images/4febb138-bdc2-52d6-b572-8d16cd549510.png" width="180" alt="Velocity Capital Group" style="display:block;"></td><td align="right" valign="middle"><span style="display:inline-block;background:#ffffff;color:#f0781e;font-family:Arial,Helvetica,sans-serif;font-size:11px;font-weight:bold;letter-spacing:1px;padding:6px 12px;border-radius:20px;">GUIDE</span></td></tr></table><div style="font-family:Arial,Helvetica,sans-serif;color:#ff8a4d;font-size:12px;font-weight:bold;letter-spacing:2px;margin-top:22px;">MERCHANT PROTECTION</div><div style="font-family:Arial,Helvetica,sans-serif;color:#ffffff;font-size:28px;line-height:35px;font-weight:bold;margin-top:8px;">Debt Consolidation Scams: What To Know</div><div style="font-famil var META={"01": {"label": "Payment Alert", "rev": "no"}, "02": {"label": "Clawback", "rev": "no"}, "03": {"label": "Legal", "rev": "no"}, "04": {"label": "Syndication", "rev": "yes"}, "05": {"label": "Wiring", "rev": "no"}, "06": {"label": "Renewal", "rev": "yes"}, "07": {"label": "Blog \u2014 Consolidation Scams", "rev": "no"}, "08": {"label": "Series 1 \u2014 Real Case Warning", "rev": "no"}, "09": {"label": "Series 2 \u2014 How It Works", "rev": "no"}, "10": {"label": "Series 3 \u2014 Red Flags", "rev": "no"}, "11": {"label": "Series 4 \u2014 What The Law Says", "rev": "no"}, "12": {"label": "Series 5 \u2014 Right Way To Relief", "rev": "yes"}};

var DEV={desktop:{w:680,scale:1},tablet:{w:600,scale:1},mobile:{w:390,scale:390/600}};
var EMAILW=600, cur="01", dev="desktop";
function loadTpl(num){document.getElementById('view').srcdoc=document.getElementById('tpl-'+num).textContent;}
function applyDev(){
  var d=DEV[dev], f=document.getElementById('view'), frame=document.getElementById('frame');
  f.style.width=EMAILW+'px';f.style.transform='scale('+d.scale+')';f.style.transformOrigin='top left';
  var shownW=Math.round(EMAILW*d.scale);
  frame.style.width=(shownW+28)+'px';
  var screen=frame.querySelector('.screen');screen.style.width=shownW+'px';
  f.style.height='1600px';screen.style.height=Math.round(1600*d.scale)+'px';
}
function pick(num){
  cur=num;
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.tpl===num));
  document.getElementById('tTitle').textContent=num+' · '+META[num].label;
  document.getElementById('tSub').textContent=(META[num].rev==='yes'?'Includes review strip · ':'')+'Track-record collage · fluid tables';
  document.getElementById('cTplName').textContent=num+' · '+META[num].label;
  loadTpl(num);applyDev();
  var f=document.getElementById('view');
  f.onload=function(){try{var h=f.contentDocument.body.scrollHeight+40;f.style.height=h+'px';f.parentNode.style.height=Math.round(h*DEV[dev].scale)+'px';}catch(e){}};
}
function setDev(d,btn){dev=d;document.querySelectorAll('.devtoggle button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');pick(cur);}
function onReviewer(){
  var sel=document.getElementById('cReviewer').value;
  document.getElementById('cEmail').style.display=(sel==='__other__')?'block':'none';
}
function sendComment(){
  var txt=document.getElementById('cText').value.trim();
  var sel=document.getElementById('cReviewer');
  var st=document.getElementById('cStatus');var btn=document.getElementById('cSend');
  var email, name;
  if(sel.value==='__other__'){email=document.getElementById('cEmail').value.trim();name=email;}
  else{email=sel.value;name=NAMES[email]||email;}
  if(!txt){st.className='status err';st.textContent='Please write a comment.';return;}
  if(!email||email.indexOf('@')<1){st.className='status err';st.textContent='Please enter your email.';return;}

  var tpl=cur+' · '+META[cur].label;
  var body=txt+"\n\nReviewer: "+name+" <"+email+">";
